repos:
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.4.2
    hooks:
      - id: sqlfluff-lint
        name: sqlfluff (lint)
        args: ["--dialect=postgres"]
        files: '\\.sql$'
      - id: sqlfluff-fix
        name: sqlfluff (fix)
        args: ["--dialect=postgres"]
        files: '\\.sql$'
